{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>BLook</title>
    <link rel="stylesheet" href="{% static 'core/css/basestyles.css' %}">
</head>
<body>
    <nav class="nav-bar">
        <a href="{% url 'home' %}">
            <img src="{% static 'core/images/shblook-long.png' %}" id="logo" class="logo" alt="BLook logo">
        </a>

        <div class="nav-buttons">
            <div class="nav-options">
                <button class="nav-option" onclick="window.location.href='{% url 'browse' %}'">Browse</button>
                <button class="nav-option" onclick="window.location.href='{% url 'my_reviews' %}'">My Reviews</button>
                <button class="nav-option" onclick="openOverlay()">Add</button>
            </div>
            <div class="genre-options">
                <a href="" class="genre-option">Novels</a>
                <a href="" class="genre-option">Comics</a>
                <a href="" class="genre-option">Manga</a>
                <a href="" class="genre-option">WebNovels</a>
                <a href="" class="genre-option">Other</a>
            </div>
        </div>

        <div id="add-overlay" class="overlay">
            <div class="overlay-content">
                <h2>Choose an option</h2>
                <button class="overlay-btn" onclick="window.location.href='/core/search/'">Search for a book</button>
                <button class="overlay-btn" onclick="window.location.href='/core/upload/'">Upload a new book</button>                            
                <button class="overlay-btn close-btn" onclick="closeOverlay()">Cancel</button>

            </div>
        </div>

        <div class="search-wrapper" id="search-wrapper">
            <input type="text" name="q" id="search-input" placeholder="Search books or users...">
            <button type="button" id="search-btn">
                <img id="search-icon" src="{% static 'core/images/search-icon.svg' %}" alt="Search">
            </button>
        </div>

        <div class="profile-container">
            <a href="{% url 'profile' %}">
                <img src="{% static 'core/images/default-profile.jpg' %}" class="profile-pic">
            </a>
        </div>
    </nav>

    <header>
        <h1>BLook 📚</h1>
        {% if user.is_authenticated %}
            Welcome, {{ user.username }} |
            <a href="{% url 'logout' %}">Logout</a>
        {% else %}
            <a href="{% url 'login' %}">Login</a> |
            <a href="{% url 'register' %}">Register</a>
        {% endif %}
    </header>
    <hr>

    <script>
        function openOverlay() {
            document.getElementById("add-overlay").style.display = "flex";
        }

        function closeOverlay() {
            document.getElementById("add-overlay").style.display = "none";
        }

        const logo = document.getElementById('logo');
        function updateLogo() {
            if (window.innerWidth <= 768) {
                logo.src = "{% static 'core/images/blook-small.png' %}";
            } else {
                logo.src = "{% static 'core/images/shblook-long.png' %}";
            }
        }

        window.addEventListener('resize', updateLogo);
        window.addEventListener('load', updateLogo);

        const searchWrapper = document.getElementById("search-wrapper");
        const searchInput = document.getElementById("search-input");
        const searchBtn = document.getElementById("search-btn");

        const searchIconPath = "{% static 'core/images/search-icon.svg' %}";

        searchBtn.addEventListener("click", function () {
            const isMobile = window.innerWidth <= 768;
            const isExpanded = searchWrapper.classList.contains("expanded");

            if (isMobile) {
                if (!isExpanded) {
                    searchWrapper.classList.add("expanded");
                    searchInput.focus();
                } else if (searchInput.value.trim()) {
                    window.location.href = `{% url 'browse' %}?q=` + encodeURIComponent(searchInput.value);
                } else {
                    searchWrapper.classList.remove("expanded");
                }
            } else {
                const query = searchInput.value.trim();
                if (query) {
                    window.location.href = `{% url 'browse' %}?q=` + encodeURIComponent(query);
                }
            }
        });
    </script>

    {% block content %}{% endblock %}
</body>
</html>
