<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <title>BLook</title>
</head>
<body>
    <header>
        <h1>BLook 📚</h1>
        {% if user.is_authenticated %}
            Welcome, {{ user.username }} |
            <a href="{% url 'logout' %}">Logout</a>
        {% else %}
            <a href="{% url 'login' %}">Login</a> |
            <a href="{% url 'register' %}">Register</a>
        {% endif %}
    </header>
    <hr>
    {% block content %}{% endblock %}
</body>
</html>
