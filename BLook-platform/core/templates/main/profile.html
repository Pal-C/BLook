<!-- User Profile Page -->
{% extends 'base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'core/css/profilestyles.css' %}">

<div class="prof-wrapper">

  <div class="prof-main">
    <div class="prof-card" id="profile">
      <div class="prof-header">
        <div class="profile-pic-wrapper">
          <img 
            src="{% static 'core/images/default-profile.jpg' %}" 
            alt="Profile Picture" 
            class="prof-picture"
          />
          <button class="edit-btn" title="Change Picture">✎</button>
        </div>

        <h2>
          <div class="prof-field">
            {{ user.profile.display_name|default:user.username }}
            <button class="edit-btn" title="Edit Display Name">✎</button>
          </div>
        </h2>
        
        <p>
          <div class="prof-field">
            <span id="email-hidden">Email: ••••••••••••••</span>
            <span id="email-shown" style="display: none;">Email: {{ user.email }}</span>
            <button onclick="toggleEmail()" class="edit-btn" title="Reveal Email">👁</button>
          </div>
        </p>        

          <button class="btn change-password-btn">Change Password</button>
        </div>
      </div>
    </div>

  </div>

</div>

<script>
  function toggleEmail() {
    const hidden = document.getElementById('email-hidden');
    const shown = document.getElementById('email-shown');
    hidden.style.display = hidden.style.display === 'none' ? 'inline' : 'none';
    shown.style.display = shown.style.display === 'none' ? 'inline' : 'none';
  }
</script>

{% endblock %}
