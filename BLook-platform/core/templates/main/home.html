<!-- The Home Page -->
{% extends 'base.html' %}

{% block content %}
<h2>Welcome to BLook</h2>
<p>Discover and review books here.</p>

{% if user.is_authenticated %}
    <form method="post" action="{% url 'custom_logout' %}">
        {% csrf_token %}
        <button type="submit">Logout</button>
    </form>

{% endif %}

{% endblock %}
