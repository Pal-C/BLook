{% extends 'base.html' %}
{% block content %}

<h2>Search for a book to review</h2>
<input type="text" id="search-input" placeholder="Search by title or author...">
<div id="results-container"></div>

<script>
document.getElementById("search-input").addEventListener("input", function() {
    const query = this.value;
    if (query.length < 2) return;

    fetch(`/core/ajax/search-books/?q=` + encodeURIComponent(query))
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById("results-container");
            container.innerHTML = "";

            if (data.results.length === 0) {
                container.innerHTML = "<p>No books found.</p>";
                return;
            }

            data.results.forEach(book => {
                const bookItem = document.createElement("div");
                bookItem.innerHTML = `
                    <div class="book-result">
                        <strong>${book.title}</strong> by ${book.author}
                        <a href="/core/review/add/${book.id}/">Review this book</a>
                    </div>`;
                container.appendChild(bookItem);
            });
        });
});
</script>

{% endblock %}
