{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'core/css/addstyles.css' %}">
{% endblock %}



{% block content %}
<h1>Review "{{ book.title }}" by {{ book.author }}</h1>

<form method="POST">
    {% csrf_token %}

    <label for="rating">Rating (1-5):</label>
    <input type="number" id="rating" name="rating" min="1" max="5" required><br><br>

    <label for="title">Title:</label>
    <input id="title" name="title"><br><br>

    <label for="review">Your Review:</label>
    <textarea id="review" name="review" rows="6" cols="60" placeholder="Write your review here..."></textarea><br><br>

    <button type="submit">Submit Review</button>
</form>

<a href="{% url 'browse' %}" class="back">← Back to Browse</a> 
{% endblock %}
